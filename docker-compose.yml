services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"                      # localhost-only; reach from Mac via SSH tunnel
    healthcheck:                                   # gate backend/worker until PG accepts connections
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      # EXPOSED ON LAN (trusted home network). The panel/pipeline have NO auth, so this is
      # safe ONLY behind the home router's NAT — never port-forward :8000 to the internet.
      # NB: Docker publishes through the FORWARD/DOCKER chain, bypassing a host ufw/iptables
      # INPUT drop — so this reaches the LAN even with the box firewall's default-deny.
      # Want it private again? revert to "127.0.0.1:8000:8000" and use an SSH tunnel (docs/DEPLOY.md).
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
      # весь репо (с .git) → /repo, чтобы кнопка «Обновить из git» в панели делала
      # git pull прямо в смонтированные файлы (./backend == /app подхватит --reload).
      - .:/repo
    # auto-migrate on start (alembic upgrade head is idempotent), then serve
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.workers.scheduler

volumes:
  pgdata:
