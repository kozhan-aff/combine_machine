[alembic]
script_location = %(here)s/alembic
# prepend CWD to sys.path so `from app.config import settings` in env.py resolves.
# The alembic CLI (unlike `python -m`) does NOT add CWD — without this the container's
# `alembic upgrade head` fails with ModuleNotFoundError: No module named 'app'.
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = INFO
handlers = console
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
